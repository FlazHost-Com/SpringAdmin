name: Sync app → flazhost-runner

# Setelah CI lolos pada push ke main, sync kode app ke flazhost-runner/springadmin.
# File deploy (Dockerfile, docker-entrypoint.sh, .dockerignore, .github/) di-exclude —
# file-file itu milik flazhost-runner dan tidak akan tertimpa.
#
# Prasyarat: secret RUNNER_SYNC_APP_ID + RUNNER_SYNC_APP_KEY (GitHub App) di
# Settings → Secrets → Actions repo ini (FlazHost-Com/SpringAdmin).
# App harus punya Contents:write ke repo flazhost-runner/springadmin.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sync-runner
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout (SHA yang lolos CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Mint GitHub App token (scoped, 1 jam)
        id: apptoken
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RUNNER_SYNC_APP_ID }}
          private-key: ${{ secrets.RUNNER_SYNC_APP_KEY }}
          owner: flazhost-runner
          repositories: springadmin

      - name: Sync kode app → flazhost-runner (file deploy dipertahankan)
        env:
          TOKEN: ${{ steps.apptoken.outputs.token }}
        run: |
          set -euo pipefail
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/flazhost-runner/springadmin.git" "$RUNNER_TEMP/target"
          # Sync seluruh kode app; file deploy di flazhost-runner TIDAK ditimpa.
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='/Dockerfile' \
            --exclude='/docker-entrypoint.sh' \
            --exclude='/.dockerignore' \
            --exclude='/.github/' \
            --exclude='/.flazhost/' \
            . "$RUNNER_TEMP/target/"
          cd "$RUNNER_TEMP/target"
          git add -A
          if git diff --cached --quiet; then
            echo "Tidak ada perubahan kode app — lewati."
            exit 0
          fi
          git config user.name  flazhost-bot
          git config user.email bot@flazhost.com
          git commit -q -m "sync app: from FlazHost-Com/SpringAdmin@${GITHUB_SHA::7}"
          git push origin HEAD:main
