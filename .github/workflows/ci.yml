name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  # ============================================================================
  # Job 1 — Build & test with H2 (fast, no external services)
  # ============================================================================
  test-h2:
    name: Test (H2 / in-memory)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run all tests (H2 profile)
        run: ./mvnw test -Dspring.profiles.active=test -B

      - name: Run ArchUnit tests explicitly
        run: ./mvnw test -Dtest=ArchitectureTest -Dspring.profiles.active=test -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-h2
          path: |
            target/surefire-reports/
            target/cucumber-reports/

  # ============================================================================
  # Job 2 — Optional MySQL integration matrix test
  # ============================================================================
  test-mysql:
    name: Test (MySQL ${{ matrix.mysql-version }})
    runs-on: ubuntu-latest
    # Only run on push to main/master or when explicitly labelled
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    strategy:
      fail-fast: false
      matrix:
        mysql-version: [ "8.0", "8.4" ]

    services:
      mysql:
        image: mysql:${{ matrix.mysql-version }}
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_DATABASE: springadmin_test
          MYSQL_USER: springadmin
          MYSQL_PASSWORD: springadmin
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -prootpass"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Run tests against MySQL ${{ matrix.mysql-version }}
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/springadmin_test?allowPublicKeyRetrieval=true&useSSL=false
          SPRING_DATASOURCE_USERNAME: springadmin
          SPRING_DATASOURCE_PASSWORD: springadmin
          SPRING_DATA_REDIS_HOST: 127.0.0.1
          SPRING_DATA_REDIS_PORT: 6379
          APP_JWT_SECRET: dGVzdC1qd3Qtc2VjcmV0LWR1bW15LW1pbi0zMi1jaGFyYWN0ZXJzLW9r
          APP_JWT_EXPIRATION: 3600
          APP_BCRYPT_ROUNDS: 4
          APP_STORAGE_ROOT: /tmp/springadmin-ci-uploads
        run: |
          ./mvnw test \
            -Dspring.profiles.active=mysql-test \
            -Dspring.datasource.url="${SPRING_DATASOURCE_URL}" \
            -Dspring.datasource.username="${SPRING_DATASOURCE_USERNAME}" \
            -Dspring.datasource.password="${SPRING_DATASOURCE_PASSWORD}" \
            -Dspring.data.redis.host="${SPRING_DATA_REDIS_HOST}" \
            -Dspring.data.redis.port="${SPRING_DATA_REDIS_PORT}" \
            -Dapp.jwt.secret="${APP_JWT_SECRET}" \
            -Dapp.jwt.expiration="${APP_JWT_EXPIRATION}" \
            -Dapp.bcrypt.rounds="${APP_BCRYPT_ROUNDS}" \
            -Dapp.storage.root="${APP_STORAGE_ROOT}" \
            -B

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-mysql-${{ matrix.mysql-version }}
          path: target/surefire-reports/
